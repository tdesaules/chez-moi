[".config/usage/specs"]
    type = "archive"
    url = "https://github.com/tdesaules/usage-specs/archive/main.tar.gz"
    exact = true
    stripComponents = 1
    include = ["*/*.kdl"]

[".config/nvim"]
    type = "archive"
    url = "https://github.com/LazyVim/starter/archive/main.tar.gz"
    exact = true
    stripComponents = 1

{{- $gopass_dank_version := (gitHubLatestRelease "tdesaules/gopass-dank").TagName -}}
[".config/DankMaterialShell/plugins/gopass-dank"]
    type = "archive"
    url = "https://github.com/tdesaules/gopass-dank/archive/{{ $gopass_dank_version }}.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
