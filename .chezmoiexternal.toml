[".config/usage/specs"]
    type = "archive"
    url = "https://github.com/tdesaules/usage-specs/archive/main.tar.gz"
    exact = true
    stripComponents = 1
    include = ["*/*.kdl"]

[".config/nvim"]
    type = "archive"
    url = "https://github.com/LazyVim/starter/archive/main.tar.gz"
    exact = true
    stripComponents = 1

[".config/DankMaterialShell/plugins/gopass-dms"]
    type = "archive"
    url = 'https://github.com/tdesaules/gopass-dms/archive/{{ (gitHubLatestRelease "tdesaules/gopass-dms").TagName }}.tar.gz'
    exact = true
    stripComponents = 1

[".config/DankMaterialShell/plugins/pinentry-dms"]
    type = "archive"
    url = 'https://github.com/tdesaules/pinentry-dms/releases/download/{{ (gitHubLatestRelease "tdesaules/pinentry-dms").TagName }}/pinentry-dms-plugin-{{ (gitHubLatestRelease "tdesaules/pinentry-dms").TagName | trimPrefix "v" }}.tar.gz'
    exact = true
    stripComponents = 1
