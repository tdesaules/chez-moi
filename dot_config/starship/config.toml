[username]
disabled = false
show_always = true
style_user = 'nord_frost_2'
style_root = 'nord_aurora_0'
format = '[$user]($style)'

[hostname]
disabled = false
ssh_only = false
format = ' [@](nord_snow_2) [$hostname](nord_aurora_3)'

[directory]
disabled = false
home_symbol = 'ŌŠĢ'
use_os_path_sep = false
truncation_length = 0
truncate_to_repo = false
format = ' -- \[ [$path](nord_frost_1) \]'

[git_branch]
disabled = false
always_show_remote = true
format = ' -- \[ ’Éś [[$branch](nord_frost_0) ’ā«  \([$remote_branch](nord_aurora_4)\)](nord_snow_2)'

[git_commit]
disabled = false
commit_hash_length = 7
format = ' ’ģ▓  [$hash $tag](nord_aurora_4)'
only_detached = false
tag_disabled = false
tag_max_candidates = 3
tag_symbol = '¾▒ŹĄ '

[git_metrics]
disabled = false
ignore_submodules = false
only_nonzero_diffs = true
format = '( ¾▒ōŖ \([$added](nord_aurora_3)\))( ¾▒ōŗ \([$deleted](nord_aurora_0)\))'

[git_state]
disabled = false
rebase = 'rebasing'
merge = 'merging'
revert = 'reverting'
cherry_pick = 'cherry-picking'
bisect = 'bisecting'
am = '.am'
am_or_rebase = 'am/rebase'
format = '\( [$state($progress_current/$progress_total)](nord_snow_2) \) '

[git_status]
use_git_executable = true
disabled = false
conflicted = ' [con](nord_aurora_1) '
deleted = ' [del](nord_aurora_0) '
ahead = ' [ahe](nord_aurora_3) '
behind = ' [beh](nord_frost_2) '
diverged = ' [div](nord_aurora_4) '
up_to_date = ' [utd](nord_aurora_3) '
untracked = ' [unt](nord_aurora_2) '
stashed = ' [sts](nord_snow_0) '
modified = ' [mod](nord_aurora_2) '
staged = ' [stg](nord_frost_0) '
renamed = ' [ren](nord_aurora_4) '
typechanged = ' [] '
format = ':([$all_status$ahead_behind](nord_snow_2) \])'

[package]
disabled = false
format = ' -- \[ $symbol$version \]'
symbol = 'Ņ¼® '
version_format = 'v${raw}'
display_private = true

[rust]
disabled = false
format = ' -- \[ $symbol$version \]'
version_format = 'v${raw}'
symbol = 'ŅÜŗ '
detect_extensions = ['rs']
detect_files = ['Cargo.toml']
detect_folders = []

[cmd_duration]
disabled = true

[time]
disabled = false
use_12hr = false
time_format = '%T'
format = '\[ [$time](nord_aurora_2) \] '

[shell]
disabled = false
bash_indicator = 'bash'
fish_indicator = 'fish'
format = '[’äĀ  \( [$indicator](nord_aurora_0) \)](nord_snow_2) '

[character]
success_symbol = '[Ō×£](nord_snow_2)'
error_symbol = '[Ō×£](nord_aurora_0)'

[custom.hw_type]
description = "Detects if the system is bare-metal or virtual"
command = """
case "$(hostnamectl chassis)" in
  vm|container) echo "$(hostnamectl property chassis)" ;;
  *) echo "metal" ;;
esac
"""
when = "which hostnamectl"
shell = ["bash", "--noprofile", "--norc"]
format = ' -- \[ [$output](nord_aurora_1) \]'

[custom.os_distro]
description = "Detects the specific OS distribution"
command = "grep '^PRETTY_NAME=' /etc/os-release | cut -d'=' -f2 | tr -d '\"' | tr '[:upper:]' '[:lower:]'"
when = "test -f /etc/os-release"
shell = ["bash", "--noprofile", "--norc"]
format = ' / \[ [$output](nord_aurora_0) \]'
