palette = "nord"

[palettes.nord]
nord_polar_0 = "#2E3440"
nord_polar_1 = "#3B4252"
nord_polar_2 = "#434C5E"
nord_polar_3 = "#4C566A"
nord_snow_0 = "#D8DEE9"
nord_snow_1 = "#E5E9F0"
nord_snow_2 = "#ECEFF4"
nord_frost_0 = "#8FBCBB"
nord_frost_1 = "#88C0D0"
nord_frost_2 = "#81A1C1"
nord_frost_3 = "#5E81AC"
nord_aurora_0 = "#BF616A"
nord_aurora_1 = "#D08770"
nord_aurora_2 = "#EBCB8B"
nord_aurora_3 = "#A3BE8C"
nord_aurora_4 = "#B48EAD"

format = """
$username\
$hostname\
